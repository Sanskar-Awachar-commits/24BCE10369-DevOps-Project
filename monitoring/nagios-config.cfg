define host {
    use                     linux-server
    host_name               corporate-portal
    alias                   Corporate Employee Portal
    address                 127.0.0.1
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               corporate-portal
    service_description     HTTP Availability
    check_command           check_http!-I 127.0.0.1 -p 8082
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
}