# Expose everything to the tracking system
management.endpoints.web.exposure.include=*
management.endpoint.metrics.enabled=true

# Graphite configuration
management.metrics.export.graphite.enabled=true
management.metrics.export.graphite.host=host.docker.internal
management.metrics.export.graphite.port=2004

# FORCE DATA DELIVERY EVERY 5 SECONDS (Bailout for quick screenshots)
management.metrics.export.graphite.step=5s