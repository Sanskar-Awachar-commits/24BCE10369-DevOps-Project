version: '3.8'

services:
  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: graphite-server
    ports:
      - "8085:80"       # Graphite Web UI
      - "2004:2004"     # Pickle receiver port
      - "2003:2003"     # Plaintext receiver port
    networks:
      - portal-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-server
    ports:
      - "3000:3000"     # Grafana Web UI
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - graphite
    networks:
      - portal-net

  nagios:
    image: jasonrivers/nagios:latest
    container_name: nagios-server
    ports:
      - "8086:80"       # Nagios Web UI
    volumes:
      # Mounts your custom config file into the Nagios container
      - ./monitoring/nagios-config.cfg:/opt/nagios/etc/conf.d/custom-config.cfg
    networks:
      - portal-net

networks:
  portal-net:
    driver: bridge